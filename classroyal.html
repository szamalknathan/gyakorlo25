<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Mini Clash Royale</title>
<style>
body{margin:0;background:#3aa0ff;font-family:Arial;color:white;text-align:center}
#top{padding:10px;background:#1f4e79}
#arena{position:relative;width:900px;height:500px;margin:10px auto;background:#6cc070;border:4px solid #222;overflow:hidden}
.tower{position:absolute;width:70px;height:120px;background:#666;color:white;font-weight:bold;display:flex;align-items:center;justify-content:center}
#playerTower{left:20px;top:190px}
#enemyTower{right:20px;top:190px}
.card{padding:8px 12px;margin:5px}
</style>
</head>
<body>
<div id="top">
<h2>Mini Clash Royale</h2>
<div>Elixír: <span id="elixir">10</span>/10 | Aranytorony HP: <span id="enemyhp">500</span></div>
<button class="card" onclick="spawn('knight')">Lovag (3)</button>
<button class="card" onclick="spawn('giant')">Óriás (5)</button>
<button class="card" onclick="spawn('archer')">Íjász (4)</button>
</div>

<div id="arena">
<div class="tower" id="playerTower">500</div>
<div class="tower" id="enemyTower">500</div>
</div>

<script>
const arena=document.getElementById('arena');
let elixir=10;
let enemyHP=500;
let playerHP=500;

const units=[];
const enemies=[];

setInterval(()=>{
  if(elixir<10) elixir+=0.1;
  document.getElementById('elixir').innerText=Math.floor(elixir);
},100);

function createUnit(x,type,team){
  const div=document.createElement('div');
  div.style.position='absolute';
  div.style.width='30px';
  div.style.height='30px';
  div.style.borderRadius='50%';
  div.style.top='235px';
  div.style.left=x+'px';

  let hp=40,speed=1,damage=5,color='blue';

  if(type==='giant'){hp=120;speed=.5;damage=15;}
  if(type==='archer'){hp=30;speed=1.2;damage=8;color='cyan';}

  if(team==='enemy') color='red';

  div.style.background=color;
  arena.appendChild(div);

  return {div,x,team,hp,speed,damage,type};
}

function spawn(type){
  const cost={knight:3,giant:5,archer:4}[type];
  if(elixir<cost) return;

  elixir-=cost;
  units.push(createUnit(100,type,'player'));
}

function spawnEnemy(){
  const types=['knight','giant','archer'];
  const t=types[Math.floor(Math.random()*types.length)];
  enemies.push(createUnit(760,t,'enemy'));
}
setInterval(spawnEnemy,3000);

function update(){
  units.forEach((u,i)=>{
    u.x+=u.speed;
    u.div.style.left=u.x+'px';

    enemies.forEach((e,j)=>{
      if(Math.abs(u.x-e.x)<25){
        e.hp-=u.damage;
        u.hp-=e.damage;

        if(e.hp<=0){e.div.remove();enemies.splice(j,1);}
        if(u.hp<=0){u.div.remove();units.splice(i,1);}
      }
    });

    if(u.x>780){
      enemyHP-=u.damage;
      document.getElementById('enemyhp').innerText=enemyHP;
      u.div.remove();
      units.splice(i,1);

      if(enemyHP<=0){
        alert('Győzelem!');
        location.reload();
      }
    }
  });

  enemies.forEach((e,i)=>{
    e.x-=e.speed;
    e.div.style.left=e.x+'px';

    if(e.x<90){
      playerHP-=e.damage;
      document.getElementById('playerTower').innerText=playerHP;
      e.div.remove();
      enemies.splice(i,1);

      if(playerHP<=0){
        alert('Vereség!');
        location.reload();
      }
    }
  });

  requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
