<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Battle Royale 2D</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#87ceeb;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const gravity = 0.7;
const ground = canvas.height - 120;

const player = {
    x:100,
    y:200,
    w:40,
    h:60,
    vx:0,
    vy:0,
    hp:100,
    onGround:false
};

const bullets = [];
const enemies = [];
const walls = [];

let score = 0;
const keys = {};
const mouse = {x:0,y:0};

for(let i=0;i<5;i++){
    spawnEnemy();
}

function spawnEnemy(){
    enemies.push({
        x:500 + Math.random()*800,
        y:ground-60,
        w:40,
        h:60,
        hp:30
    });
}

document.addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()] = true;

    if(e.key === " " && player.onGround){
        player.vy = -15;
    }

    if(e.key.toLowerCase()==="e"){
        walls.push({
            x:player.x+60,
            y:player.y,
            w:40,
            h:100
        });
    }
});

document.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()] = false;
});

canvas.addEventListener("mousemove",e=>{
    mouse.x=e.clientX;
    mouse.y=e.clientY;
});

canvas.addEventListener("click",()=>{

    let dx = mouse.x-(player.x+20);
    let dy = mouse.y-(player.y+30);

    let len = Math.sqrt(dx*dx+dy*dy);

    bullets.push({
        x:player.x+20,
        y:player.y+30,
        vx:dx/len*12,
        vy:dy/len*12
    });
});

function updatePlayer(){

    if(keys["a"]) player.vx=-5;
    else if(keys["d"]) player.vx=5;
    else player.vx=0;

    player.x += player.vx;

    player.vy += gravity;
    player.y += player.vy;

    if(player.y+player.h>=ground){
        player.y=ground-player.h;
        player.vy=0;
        player.onGround=true;
    }else{
        player.onGround=false;
    }
}

function updateBullets(){

    for(let i=bullets.length-1;i>=0;i--){

        let b=bullets[i];

        b.x+=b.vx;
        b.y+=b.vy;

        for(let j=enemies.length-1;j>=0;j--){

            let e=enemies[j];

            if(
                b.x>e.x &&
                b.x<e.x+e.w &&
                b.y>e.y &&
                b.y<e.y+e.h
            ){
                e.hp-=10;
                bullets.splice(i,1);

                if(e.hp<=0){
                    enemies.splice(j,1);
                    score++;
                    spawnEnemy();
                }
                break;
            }
        }

        if(
            b.x<0||
            b.x>canvas.width||
            b.y<0||
            b.y>canvas.height
        ){
            bullets.splice(i,1);
        }
    }
}

function updateEnemies(){

    enemies.forEach(e=>{

        if(e.x>player.x) e.x-=1;
        else e.x+=1;

        if(
            Math.abs(e.x-player.x)<40 &&
            Math.abs(e.y-player.y)<40
        ){
            player.hp-=0.05;
        }
    });
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="green";
    ctx.fillRect(0,ground,canvas.width,120);

    ctx.fillStyle="sienna";
    walls.forEach(w=>{
        ctx.fillRect(w.x,w.y,w.w,w.h);
    });

    ctx.fillStyle="blue";
    ctx.fillRect(player.x,player.y,player.w,player.h);

    ctx.fillStyle="red";
    enemies.forEach(e=>{
        ctx.fillRect(e.x,e.y,e.w,e.h);
    });

    ctx.fillStyle="black";
    bullets.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x,b.y,4,0,Math.PI*2);
        ctx.fill();
    });

    ctx.fillStyle="white";
    ctx.font="24px Arial";
    ctx.fillText("HP: "+Math.floor(player.hp),20,40);
    ctx.fillText("Pont: "+score,20,80);

    if(player.hp<=0){
        ctx.font="60px Arial";
        ctx.fillText(
            "VÉGE A JÁTÉKNAK",
            canvas.width/2-250,
            canvas.height/2
        );
    }
}

function gameLoop(){

    if(player.hp>0){
        updatePlayer();
        updateBullets();
        updateEnemies();
    }

    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
