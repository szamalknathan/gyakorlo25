<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini FIFA</title>
<style>
body{margin:0;background:#1f7a3a;font-family:Arial,sans-serif;color:white}
#ui{padding:10px;text-align:center}
canvas{display:block;margin:auto;background:#2da44e;border:3px solid #fff}
</style>
</head>
<body>
<div id="ui">
<h2>Mini FIFA</h2>
<p>WASD = mozgás | Space = lövés | X = passz</p>
<div id="score">Hazai 0 - 0 Vendég | 90:00</div>
</div>
<canvas id="game" width="1000" height="600"></canvas>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");

let home=0, away=0, timeLeft=90*60;

const player={x:200,y:300,r:15,speed:4};
const ball={x:500,y:300,r:8,vx:0,vy:0};

const teammates=[
{x:300,y:200,r:12},{x:300,y:400,r:12},
{x:450,y:250,r:12},{x:450,y:350,r:12}
];

const enemies=[
{x:700,y:200,r:12},{x:700,y:400,r:12},
{x:600,y:250,r:12},{x:600,y:350,r:12}
];

const keys={};

document.addEventListener("keydown",e=>{
 keys[e.key.toLowerCase()]=true;

 if(e.code==="Space"){
   shoot();
 }
 if(e.key.toLowerCase()==="x"){
   passBall();
 }
});

document.addEventListener("keyup",e=>{
 keys[e.key.toLowerCase()]=false;
});

function shoot(){
 let dx=950-ball.x;
 let dy=300-ball.y;
 let len=Math.hypot(dx,dy);
 ball.vx=dx/len*12;
 ball.vy=dy/len*12;
}

function passBall(){
 let mate=teammates[0];
 let dx=mate.x-ball.x;
 let dy=mate.y-ball.y;
 let len=Math.hypot(dx,dy);
 ball.vx=dx/len*8;
 ball.vy=dy/len*8;
}

function update(){
 if(keys["w"]) player.y-=player.speed;
 if(keys["s"]) player.y+=player.speed;
 if(keys["a"]) player.x-=player.speed;
 if(keys["d"]) player.x+=player.speed;

 let dx=ball.x-player.x;
 let dy=ball.y-player.y;
 let d=Math.hypot(dx,dy);

 if(d<25){
   ball.vx=dx*0.15;
   ball.vy=dy*0.15;
 }

 enemies.forEach(e=>{
   if(ball.x<e.x) e.x-=0.7;
   else e.x+=0.7;

   if(ball.y<e.y) e.y-=0.7;
   else e.y+=0.7;
 });

 ball.x+=ball.vx;
 ball.y+=ball.vy;
 ball.vx*=0.98;
 ball.vy*=0.98;

 if(ball.y<0||ball.y>600) ball.vy*=-1;

 if(ball.x>980 && ball.y>220 && ball.y<380){
   home++;
   reset();
 }

 if(ball.x<20 && ball.y>220 && ball.y<380){
   away++;
   reset();
 }

 timeLeft=Math.max(0,timeLeft-1/60);

 const mins=Math.floor(timeLeft/60);
 const secs=Math.floor(timeLeft%60);
 document.getElementById("score").textContent =
   `Hazai ${home} - ${away} Vendég | ${mins}:${String(secs).padStart(2,"0")}`;
}

function reset(){
 ball.x=500; ball.y=300;
 ball.vx=0; ball.vy=0;
}

function draw(){
 ctx.clearRect(0,0,1000,600);

 ctx.strokeStyle="white";
 ctx.lineWidth=4;
 ctx.strokeRect(0,0,1000,600);

 ctx.beginPath();
 ctx.arc(500,300,80,0,Math.PI*2);
 ctx.stroke();

 ctx.fillStyle="yellow";
 ctx.fillRect(0,220,20,160);
 ctx.fillRect(980,220,20,160);

 ctx.fillStyle="blue";
 ctx.beginPath();
 ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
 ctx.fill();

 ctx.fillStyle="cyan";
 teammates.forEach(p=>{
   ctx.beginPath();
   ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
   ctx.fill();
 });

 ctx.fillStyle="red";
 enemies.forEach(p=>{
   ctx.beginPath();
   ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
   ctx.fill();
 });

 ctx.fillStyle="white";
 ctx.beginPath();
 ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
 ctx.fill();
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
